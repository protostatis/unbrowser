# Runs on every push and PR. Lightweight: cargo check + clippy + fmt + a JSON-RPC
# smoke test that doesn't touch the network. Catches regressions in the loop and
# in the embedded JS without flakiness from external sites.
#
# The release workflow (release.yml) is the one that does full release builds for
# all platforms — kept separate so PRs don't pay the BoringSSL compile triple.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build + test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install build deps (BoringSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Block on warnings — we don't ship code that lints poorly.
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --release

      - name: Smoke test (JSON-RPC loop + QuickJS)
        # No network. Verifies: process starts, parses JSON, runs JS, returns
        # the right answer, exits cleanly.
        run: |
          {
            echo '{"id":1,"method":"eval","params":{"code":"1+2"}}'
            echo '{"id":2,"method":"eval","params":{"code":"({hello: \"world\"})"}}'
            echo '{"id":3,"method":"close"}'
          } | ./target/release/unbrowser > /tmp/smoke.out
          cat /tmp/smoke.out
          grep -q '"result":3'                          /tmp/smoke.out
          grep -q '"result":{"hello":"world"}'          /tmp/smoke.out
          grep -q '"result":"bye"'                      /tmp/smoke.out
          echo "smoke test passed"

      - name: Python syntax check (router + client + helpers)
        run: |
          python3 -m py_compile scripts/router.py
          python3 -m py_compile scripts/fp_check.py
          python3 -m py_compile scripts/watch.py
          python3 -m py_compile python/unbrowser/__init__.py
